services:
  db-server:
    container_name: db-server
    image: postgres:latest
    environment:
      - POSTGRES_DB=bouncy
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=Password123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/docker
    networks:
      - local_network
volumes:
  pg_data:

networks:
  local_network:
    driver: bridge
