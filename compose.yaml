services:
  db-server:
    container_name: db-server
    image: postgres:latest
    environment:
      - POSTGRES_DB=bouncy
      - POSTGRES_USER=dbuser
      - POSTGRES_PASSWORD=Password123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/docker
    networks:
      - local_network

  vault:
    image: hashicorp/vault:latest
    ports:
      - "8200:8200"
    volumes:
      - vault_data:/vault/file
    networks:
      - local_network
volumes:
  keycloak_data:
  pg_data:
  vault_data:

networks:
  local_network:
    driver: bridge
